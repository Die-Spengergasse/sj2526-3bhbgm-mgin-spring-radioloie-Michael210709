<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reservation</title>
</head>
<body>

    <form th:action="@{/patient/add}" th:object="${patient}" method="post">

    </form>



        <input type="submit" class="form-control" value="Save">

</div>
