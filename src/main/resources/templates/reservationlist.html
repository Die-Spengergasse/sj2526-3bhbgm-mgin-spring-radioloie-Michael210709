<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reservationslist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Reservationlist</h1>

    <table class="table">
        <tr>
            <th>Patient</th>
            <th>Device</th>
            <th>Date</th>
            <th>Start</th>
            <th>End</th>
        </tr>

        <tr th:each="r : ${reservations}">
            <td th:text="${r.patient.name + ' ' + r.patient.surname}"></td>
            <td th:text="${r.device.type}"></td>
            <td th:text="${r.date}"></td>
            <td th:text="${r.startTime}"></td>
            <td th:text="${r.endTime}"></td>
        </tr>
    </table>
    <a th:href="@{/reservation/add_reservation}" class="btn btn-primary">
        Neue Reservierung
    </a>
</div>
</body>
</html>
